name: Feature request
description: Propose a focused improvement to the plugin or its documentation.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Anvil Serving Realtime
        - OpenAI-Compatible Cascade
        - Installation and packaging
        - Documentation
        - Compatibility
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operator or user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and any compatibility tradeoffs.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: compatibility
    attributes:
      label: Compatibility
      options:
        - label: I considered existing `anvil` and `openai-cascade` configurations.
          required: true
